<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <style>
        #f1 {
            background-color: rgb(156, 214, 244);
            width: 1050px;
            margin: auto;
            outline: 1px solid gray;
            border: 7px solid rgb(252, 206, 214);
            padding-bottom: 15px;
            align-items: center;
            align-content: center;
        }

        h2 {
            text-align: center;
            padding-top: 30px;
        }

        hr {
            border: 0.05em solid white;
            width: 750px;
            margin-bottom: 10px;
        }

        form {
            display: grid;
            grid-template-columns: auto;
            grid-template-rows: auto;
            width: 570px;
            row-gap: 10px;
            margin: auto;
        }

        .f2 {
            display: flex;
            gap: 2px;
            width: 18px;
        }

        #select {
            width: 250px;
            height: 25px;
            background-color: white;
            border: 1px solid gray;
            outline: none;
        }

        textarea {
            width: 475px;
        }

        input {
            width: 475px;
            height: 30px;
        }

        button {
            margin-top: 5px;
            margin-left: 15px;
            width: 450px;
            height: 30px;
            color: white;
            font-size: 0.98rem;
            outline: none;
            border: none;
            background-color: rgb(42, 158, 42);
            align-content: center;
        }
    </style>

</head>

<body>
    <div id="f1">
        <h2>Student Registration Form</h2>
        <hr>
        <form>
            <label for="FirstName">FirstName: </label>
            <input type="text" name="FirstName" placeholder="FirstName">

            <label for="MiddleName">MiddleName:</label>
            <input type="text" name="MiddleName" placeholder="MiddleName">

            <label for="LastName">LastName:</label>
            <input type="text" name="LastName" placeholder="LastName">

            <label for="Course">Course</label>
            <select name="Course" id="select">
                <option value="Web Developmet">Web Developmet</option>
                <option value="Computer Networks">Computer Networks</option>
            </select>

            <label for="Gender">Gender</label>
            <div class="f2">
                <input type="radio" name="Gender" value="Female" />
                <label for="Female">Female</label>
                <input type="radio" name="Gender" value="Male" /><label for="Male">Male</label>
                <input type="radio" name="Gender" value="Transgender" /><label for="Female">Transgender</label>
            </div>

            <label for="PhoneNumber">PhoneNumber</label>
            <input type="text" name="PhoneNumber" placeholder="PhoneNumber">

            <label for="Address">Current Address </label>
            <textarea name="Address" id="textarea" cols="1" rows="5" placeholder="Current Address"></textarea>

            <label for="Email"> Email</label>
            <input type="email" name="Email" placeholder="Enter Email">

            <label for="Password">Password</label>
            <input type="password" name="Password" placeholder="Password">

            <label for="Password">Re-Type Password</label>
            <input type="Password" name="Password" placeholder="Re-Type Password">

            <button type="button">Register</button>
        </form>
    </div>

</body>

</html>
