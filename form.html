<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Registration Form</h1>
    <div>
      <form action="">
        <label for="Name">Enter the Name</label><br />
        <input type="text" name="UserName" placeholder="Enter the Username" />
        <br /><br />

        <label for="LastName">Enter the Last Name</label><br />
        <input type="text" name="LastName" placeholder="Enter the LastName" />
        <br /><br />

        <label for="PhoneNumber">Enter the PhoneNumber</label><br />
        <input
          type="text"
          name="PhoneNumber"
          placeholder="Enter the PhoneNumber"
        /><br /><br />

        <label for="Email">Enter the Email id</label><br />
        <input
          type="email"
          name="Email"
          placeholder="Enter the Email ID"
        /><br /><br />

        <label for="Gender">Select your Gender</label><br /><br />
        <input type="radio" name="Gender" value="Female" />
        <label for="Female"
          >Female</label
        ><br /><br />
        <input type="radio" name="Gender" value="Male" /><label for="Male"
          >Male</label
        ><br /><br />
        <input type="radio" name="Gender" value="Transgender" /><label
          for="Female"
          >Transgender</label
        ><br /><br />

        <label for="Birthdate">Select your birthdate</label><br />
        <input type="date" name="Birthdate" /><br /><br />

        <label for="city">Select your city</label><br /><br />
        <input type="checkbox" name="city" value="Pune" /><label for="Pune"
          >Pune</label
        ><br /><br />
        <input type="checkbox" name="city" value="Mumbai" /><label for="Mumbai"
          >Mumbai</label
        ><br /><br />
        <input type="checkbox" name="city" value="Ahemdabad" /><label
          for="Ahemdabad"
          >Ahemdabad</label
        ><br /><br />

        <label for="Signature">Upload your Signature</label><br />
        <input type="file" name="Signature" /><br /><br />

        <input type="submit" /><br /><input type="reset" /><br />
      </form>
    </div>

    <div style="border: 2px solid black; width: 400px">
      <table>
        <tr>
          <th>UserName</th>
          <td>
            
              type="text"
              name="UserName"
              placeholder="Enter the Username"
            />
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
