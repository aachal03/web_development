<!-- @format -->

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Translate</title>

  <style>
    body {
      padding: 0;
      margin: 0;
    }

    #d2,
    #d3, #d4, #d5, #d6, #d7, #d8, #d9 {
      color: white;
      text-align: center;
      line-height: 100px;
      width: 150px;
      height: 100px;
    }

    /* #d1 {
      background-color: pink;
    } */

    #d2 {
      transform: translate(420px, 5px);
      background-color: rgb(207, 93, 146);
    }

    #d3 {
      background-color: rgb(150, 40, 91);
      transform: translate(175px, 2px);
    }

    #d4 {
      background-color: rgb(150, 40, 91);
      transform: translate(105px, 8px);
    }

    #d5 {
      background-color: rgb(150, 40, 91);
      transform: translate(5px, 15px);
    }

    #d6 {
      background-color: rgb(150, 40, 91);
      transform: translate(175px, 15px);
    }

    #d7 {
      background-color: rgb(150, 40, 91);
      transform: translate(280px, 25px);
    }

    #d8 {
      background-color: rgb(150, 40, 91);
      transform: translate(310px, 25px);
    }

    #d9 {
      background-color: rgb(150, 40, 91);
      transform: translate(410px, 18px);
    }
  </style>
</head>

<body>
  <!-- <div id="d1">Box</div> -->

  <div id="d2">Box 2</div>
  <div id="d3">Box 3</div>
  <div id="d4">Box 4</div>
  <div id="d5">Box 5</div>
  <div id="d6">Box 6</div>
  <div id="d7">Box 7</div>
  <div id="d8">Box 8</div>
  <div id="d9">Box 9</div>
      
</body>

</html>
