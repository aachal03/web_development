<!-- @format -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      body {
        padding: 0px;
        margin: 0px;
      }

      ul {
        padding: 20px;
        margin: 0;
        position: absolute;
        top: 5%;
        left: 8%;
        font-size: 40px;
        background-color: violet;
      }

      ul li {
        list-style-type: none;
        float: right;
        padding: 4px;
        transition: 0.5s;
      }

      ul:hover li {
        /* transform: rotateX(180deg);
        transform: rotateY(180deg); */
        transform: rotate(270deg);
      }
    </style>
  </head>

  <body>
    <ul>
      <li>S</li>
      <li>E</li>
      <li>V</li>
      <li>E</li>
      <li>N</li>
    </ul>
  </body>
</html>
