<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div {
            background-color: rgb(213, 161, 116);
            height: 250px;
            width: 300px;
            border-radius: 2%;
            animation-name: a1;
            animation-duration: 6.7s;
            animation-fill-mode: backwards;
        }

        @keyframes a1 {
            to {
                height: 180px;
                width: 280px;
                background-color: brown;
                animation-delay: 2s;
            }
        }

        img {
            height: 180px;
            width: 280px;
            margin: auto;
            animation-name: a2;
            animation-duration: 6s;
        }

        @keyframes a2 {
            to {
                height: 100px;
                width: 220px;
                animation-delay: 2.5s;
            }
        }
    </style>
</head>

<body>
    <div>

        <img src="/Superdry-Logo.wine.png" alt="i1">
    </div>

  
</body>

</html>
