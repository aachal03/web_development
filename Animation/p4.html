<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div{
            background-color: peachpuff;
            width: 200px;
            height: 150px;
            color: white;
            text-align: center;
            line-height: 150px;
            transition: height 3.5s, width 2s, transform 2s;
        }

        div:hover{
            height: 320px;
            width: 430px;
            transform: rotate(135deg);
        }
    </style>
</head>
<body>
    <div>Welcome</div>
</body>
</html>
