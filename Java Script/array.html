<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array in Javascript</title>
</head>
<body>
    <script>
        let n=[1, "d", "aa", 8.9]
       let m= n.length;
        document.write("length is " + m + "<br>")
        document.write(n[0] + "<br>");
        document.write(n[1]  + "<br>");
        document.write(n[2] + "<br>");
        document.write(n[3] + "<br>");
        // document.write(n[4]); 
        

        //Print numbers using array and for loop
        var a=[n]
        for(a[n]=0; a[n]<=8; a[n]++)
        {
            document.write("<br>")
            document.write(a[n])
        }

        //ARRAY IS AN OBJECT
        let num= new Array(4, "hh", 7, 8855647);
        document.write(num[0] + "<br>" + num[1] + "<br>" + num[2] + "<br>" + num[3]+ "<br>");

        document.write("<br>");
        let e=[1, "Jane", 4000]
        let len=e.length;
        document.write("lenght is " + len)
        for(let i=0; i<=2; i++)
        {
            document.write("<br>")
            document.write(e[i])
        }
        document.write("<br>")
        document.write("<br>")
    

        //functions on array
        //1. concat

        let a1=[1,2,3,4]
        let a2=[8,"hh",6, "yy"]

        let a3= a1.concat(a2);
        document.write(a3 + "<br>")
        document.write("<hr>")


        //2. push
        a1.push("iuhydihlf")
        document.write("<br> Push element in array " +a1 + "<br>");
        document.write("<hr>")
        

        //3. pop
        document.write("<br> " + a2 + "<br> ")
        a2.pop()
        document.write(a2 + "<br>")
        document.write("<hr>")


        // 4. entries
        var Array =[0,1,2, "kshfk", "ij"]
        document.write("<br>" + Array + "<br>")
        document.write("<br>")
       let itr = Array.entries();

        //for of loop
        for(let x of itr)
        {
            document.write(x + "<br>")
        }

       document.write("<br> array emp itrate <br>")
        var em=[1, "hh", 9868]
        for (var n1 of em.entries())
        {
           document.write(n1 + "<br>")
        }


        var ef=[1, 55, 66, 1]
        //document.write(typeof(ef[2]))

        var q = ef.sort(
            function compare(d,g)
            {
                return d-g;
            }
        )
        document.write(q)
        //console.log(ef)

        // document.write("<br>" + ef)
        
        
    </script>

</body>
</html>
