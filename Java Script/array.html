<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array in Javascript</title>
</head>
<body>
    <script>
        let n=[1, "d", "aa", 8.9]
       let m= n.length;
        document.write("length is " + m + "<br>")
        document.write(n[0] + "<br>");
        document.write(n[1]  + "<br>");
        document.write(n[2] + "<br>");
        document.write(n[3] + "<br>");
        // document.write(n[4]); 
        

        //Print numbers using array and for loop
        var a=[n]
        for(a[n]=0; a[n]<=8; a[n]++)
        {
            document.write("<br>")
            document.write(a[n])
        }

        //ARRAY IS AN OBJECT
        let num= new Array(4, "hh", 7, 8855647);
        document.write(num[0] + "<br>" + num[1] + "<br>" + num[2] + "<br>" + num[3]+ "<br>");

        document.write("<br>");
        let e=[1, "Jane", 4000]
        let len=e.length;
        document.write("lenght is " + len)
        for(let i=0; i<=2; i++)
        {
            document.write("<br>")
            document.write(e[i])
        }
    

    </script>

</body>
</html>
